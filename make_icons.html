<!DOCTYPE html>
<html>
<body>
<script>
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size; // shorthand

  // ── Background: IG gradient (purple → pink → orange) ──────────────────
  const grad = ctx.createLinearGradient(s, 0, 0, s);
  grad.addColorStop(0,   '#833ab4'); // 紫
  grad.addColorStop(0.5, '#e1306c'); // 粉紅
  grad.addColorStop(1,   '#f56040'); // 橘
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  // ── Progress bar (底部) ────────────────────────────────────────────────
  const barY  = s * 0.76;
  const barH  = Math.max(2, s * 0.07);
  const barL  = s * 0.10;
  const barW  = s * 0.80;

  // 灰色軌道
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.beginPath();
  ctx.roundRect(barL, barY, barW, barH, barH / 2);
  ctx.fill();

  // 白色進度（約 55%）
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(barL, barY, barW * 0.55, barH, barH / 2);
  ctx.fill();

  // 圓形 thumb
  const thumbR = Math.max(2.5, s * 0.075);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(barL + barW * 0.55, barY + barH / 2, thumbR, 0, Math.PI * 2);
  ctx.fill();

  // ── 喇叭 Icon（左上角）─────────────────────────────────────────────────
  if (s >= 48) {
    const spkX = s * 0.12;
    const spkY = s * 0.14;
    const spkW = s * 0.10;
    const spkH = s * 0.16;

    ctx.fillStyle = 'rgba(255,255,255,0.90)';

    // 喇叭本體（矩形）
    ctx.beginPath();
    ctx.roundRect(spkX, spkY + spkH * 0.2, spkW, spkH * 0.6, 1);
    ctx.fill();

    // 喇叭喇叭口（三角形）
    ctx.beginPath();
    ctx.moveTo(spkX + spkW, spkY);
    ctx.lineTo(spkX + spkW * 2.5, spkY - spkH * 0.05);
    ctx.lineTo(spkX + spkW * 2.5, spkY + spkH * 1.05);
    ctx.lineTo(spkX + spkW, spkY + spkH);
    ctx.closePath();
    ctx.fill();

    // 音波弧線（2條）
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = Math.max(1, s * 0.025);
    ctx.lineCap = 'round';
    const waveX = spkX + spkW * 3.1;
    const waveY = spkY + spkH / 2;

    ctx.beginPath();
    ctx.arc(waveX, waveY, spkH * 0.30, -Math.PI * 0.45, Math.PI * 0.45);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(waveX, waveY, spkH * 0.58, -Math.PI * 0.40, Math.PI * 0.40);
    ctx.stroke();
  }

  // ── 播放三角形（中央偏右以平衡喇叭）──────────────────────────────────
  ctx.fillStyle = '#ffffff';
  const cx = s >= 48 ? s * 0.58 : s * 0.50;
  const cy = s * 0.42;
  const r  = s * 0.18;
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.75, cy - r);
  ctx.lineTo(cx - r * 0.75, cy + r);
  ctx.lineTo(cx + r, cy);
  ctx.closePath();
  ctx.fill();

  // ── 下載 ──────────────────────────────────────────────────────────────
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon${size}.png`;
  link.textContent = `Download icon${size}.png`;
  link.style.display = 'block';
  document.body.appendChild(link);
  link.click();
});
</script>
</body>
</html>
